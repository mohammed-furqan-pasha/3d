<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Anatomy Explorer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
</head>
<body>
    <div id="ui-container">
        <div class="menu">
            <button onclick="ui.loadOrgan('brain')">Load Brain</button>
            <button onclick="ui.loadOrgan('heart')">Load Heart</button>
        </div>
        <div id="info-panel" class="info-panel">
            <h2 id="part-name">Select an organ</h2>
            <p id="part-desc">Click the buttons above to start.</p>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="scene.js"></script>
    <script src="loader.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
